services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  master:
    build: ./master
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GPU_COUNT: 4
    depends_on:
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jobs_data:/jobs
      - ./logs:/logs

volumes:
  jobs_data:
    name: gpu-job-scheduler-jobs